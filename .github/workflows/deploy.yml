name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dodeca
        run: |
          curl -fsSL https://github.com/bearcove/dodeca/releases/download/v0.13.0/dodeca-x86_64-unknown-linux-gnu.tar.xz | tar xJ
          chmod +x ddc ddc-cell-*
          echo "$PWD" >> $GITHUB_PATH

      - name: Build
        run: ddc build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=blog
