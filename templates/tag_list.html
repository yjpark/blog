{% extends "base.html" %}

{% block title %}Tags - {{ config.title }}{% endblock %}

{% block content %}
<h1 class="page-title font-serif"><em>Tags</em></h1>

{% if section.subsections %}
<div class="tag-list">
{% for sub in section.subsections %}
    <a href="{{ sub.permalink }}" class="tag-link font-serif">#{{ sub.extra.tag }}</a>
{% endfor %}
</div>
{% endif %}
{% endblock %}
